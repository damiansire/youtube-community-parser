[package]
name = "sdp-desktop"
version = "0.1.0"
description = "Sistema de trackeo de comentarios de YouTube (app de escritorio)."
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[lib]
name = "sdp_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde.workspace = true
serde_json = "1"
thiserror = "2"
sdp-core = { path = "../crates/core" }
